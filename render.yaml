services:
  - type: web
    name: enquadra-pcd-saas
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    disk:
      name: app-data
      mountPath: /opt/render/project/src/persisted-data
      sizeGB: 5
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATA_DIR
        value: /opt/render/project/src/persisted-data
      - key: APP_BASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_WEBHOOK_SECRET
        sync: false
